            $ref: '#/components/schemas/AppError'
    401Error:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    403Error:
      description: Forbidden / Role Access Blocked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    404Error:
      description: Entity Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
