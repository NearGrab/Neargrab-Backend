openapi: 3.0.3
info:
  title: Neargrab Backend API
  version: 1.0.0
  description: Complete API documentation for Neargrab, a hyper-local product discovery platform.
servers:
  - url: http://localhost:5000
    description: Local development server base URL
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the status of the service and database connectivity.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      service:
                        type: string
                        example: backend
                      timestamp:
                        type: string
                        format: date-time
                        example: "2026-06-08T12:00:00.000Z"

  /api/v1/meta:
    get:
      summary: Fetch metadata
      description: Returns list of supported cities, categories, and brands to initialize frontend state.
      security: []
      responses:
        '200':
          description: Metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaResponse'

  /api/v1/seed-preview:
    get:
      summary: Seed preview for testing
      description: Returns seeded entity summary (development environment only).
      security: []
      responses:
        '200':
          description: Seed summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object

  /api/v1/auth/signup:
    post:
      tags:
        - Auth
      summary: User Signup
      description: Create a new user profile, auth account, and default preferences.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - password
                - city
              properties:
                name:
                  type: string
                  example: Aarav Customer
                email:
                  type: string
                  format: email
                  example: customer@example.com
                phone:
                  type: string
                  example: "+919900000001"
                password:
                  type: string
                  example: Password123!
                city:
                  type: string
                  example: Navsari
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/400Error'

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: User Login
      description: Authenticate user with email/phone and password.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: customer@neargrab.test
                phone:
                  type: string
                  example: "+919900000001"
                password:
                  type: string
                  example: Password123!
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/401Error'

  /api/v1/auth/google:
    post:
      tags:
        - Auth
      summary: Google OAuth Login
      description: Authenticate with Google OAuth token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idToken
              properties:
                idToken:
                  type: string
                  example: mock-google-token
                email:
                  type: string
                  example: google-user@example.com
                name:
                  type: string
                  example: Google User
                providerUserId:
                  type: string
                  example: google-user-id
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/auth/otp/request:
    post:
      tags:
        - Auth
      summary: Request OTP
      description: Generate a 6-digit verification code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - purpose
              properties:
                identifier:
                  type: string
                  example: "+919900000001"
                purpose:
                  type: string
                  enum: [LOGIN, SIGNUP, PASSWORD_RESET, PHONE_VERIFY, EMAIL_VERIFY]
                  example: LOGIN
      responses:
        '200':
          description: OTP requested successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      expiresAt:
                        type: string
                        format: date-time
                        example: "2026-06-08T12:15:00.000Z"
                      code:
                        type: string
                        description: Present in non-production environments only
                        example: "123456"

  /api/v1/auth/otp/verify:
    post:
      tags:
        - Auth
      summary: Verify OTP
      description: Complete login/signup or verifications using the 6-digit code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - purpose
                - code
              properties:
                identifier:
                  type: string
                  example: "+919900000001"
                purpose:
                  type: string
                  enum: [LOGIN, SIGNUP, PASSWORD_RESET, PHONE_VERIFY, EMAIL_VERIFY]
                  example: LOGIN
                code:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      data:
                        type: object
                        properties:
                          success:
                            type: boolean
                            example: true

  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate Token
      description: Issue new access and refresh token using existing valid refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: "40-byte-hex-refresh-token"
      responses:
        '200':
          description: Tokens rotated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string

  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout Current Session
      description: Revoke current refresh token session.
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccess'

  /api/v1/auth/logout-all:
    post:
      tags:
        - Auth
      summary: Logout All Sessions
      description: Revoke all active login sessions.
      responses:
        '200':
          description: Logged out of all devices successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccess'

  /api/v1/auth/password/forgot:
    post:
      tags:
        - Auth
      summary: Forgot Password
      description: Request reset OTP for a password reset.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: customer@neargrab.test
      responses:
        '200':
          description: Reset code sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccess'

  /api/v1/auth/password/reset:
    post:
      tags:
        - Auth
      summary: Reset Password
      description: Reset password using code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: customer@neargrab.test
                code:
                  type: string
                  example: "123456"
                password:
                  type: string
                  example: NewPassword123!
      responses:
        '200':
          description: Password reset completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccess'

  /api/v1/me:
    get:
      tags:
        - User & Profile
      summary: Fetch Current User
      description: Returns profile, basic info, and owned shop details if any.
      responses:
        '200':
          description: Profile loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
    patch:
      tags:
        - User & Profile
      summary: Update Basic Fields
      description: Update user profile basics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Aarav Patel
                username:
                  type: string
                  example: aaravpatel
                city:
                  type: string
                  example: Surat
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
    delete:
      tags:
        - User & Profile
      summary: Deactivate Account
      description: Soft delete the user account and terminate all sessions.
      responses:
        '200':
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccess'

  /api/v1/me/profile:
    get:
      tags:
        - User & Profile
      summary: Fetch Profile Details
      description: Retrieve user profile bio, language, and other info.
      responses:
        '200':
          description: Profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
    patch:
      tags:
        - User & Profile
      summary: Update Profile Details
      description: Update profile bio, settings, preferences.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio:
                  type: string
                  example: Tech enthusiast
                language:
                  type: string
                  example: en-IN
                dateOfBirth:
                  type: string
                  format: date
                  example: "1995-12-15"
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'

  /api/v1/me/settings:
    get:
      tags:
        - User & Profile
      summary: Fetch Settings
      description: Retrieve user privacy configurations and notification channel rules.
      responses:
        '200':
          description: Settings loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
    patch:
      tags:
        - User & Profile
      summary: Update Settings
      description: Update user settings parameters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                privacyJson:
                  type: object
                  example: { "showEmail": false }
                notificationPreferences:
                  type: array
                  items:
                    type: object
                    required:
                      - channel
                      - type
                      - enabled
                    properties:
                      channel:
                        type: string
                        example: EMAIL
                      type:
                        type: string
                        example: PROMO
                      enabled:
                        type: boolean
                        example: false
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
 
  /api/v1/users/{username}/profile:
    get:
      tags:
        - User & Profile
      summary: Fetch User Public Profile by Username
      description: Retrieve public stats, reviews, and badges of any user by their unique username.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
            example: aarav-customer
      responses:
        '200':
          description: Public profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfileResponse'
        '404':
          $ref: '#/components/responses/404Error'

  /api/v1/users/{userId}/follow:
    post:
      tags:
        - User & Profile
      summary: Follow User
      description: Create a follower-following connection to another user.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            example: "user-id-abc"
      responses:
        '200':
          description: Followed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      following:
                        type: boolean
                        example: true
        '404':
          $ref: '#/components/responses/404Error'
    delete:
      tags:
        - User & Profile
      summary: Unfollow User
      description: Remove a follower-following connection to another user.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            example: "user-id-abc"
      responses:
        '200':
          description: Unfollowed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      following:
                        type: boolean
                        example: false
        '404':
          $ref: '#/components/responses/404Error'

  /api/v1/categories:
    get:
      tags:
        - Explore
      summary: Get Categories
      description: List active categories.
      security: []
      parameters:
        - name: includeCounts
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: parentId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            default: active
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'

  /api/v1/brands:
    get:
      tags:
        - Explore
      summary: Get Brands
      description: List active brands.
      security: []
      parameters:
        - name: includeCounts
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            default: active
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Brand'

  /api/v1/explore:
    get:
      tags:
        - Explore
      summary: Get Explore Feed
      description: Generates home discovery feed (carousels, nearby shops, products).
      security:
        - bearerAuth: []
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: latitude
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: longitude
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
            format: float
            default: 10
        - name: device
          in: query
          required: false
          schema:
            type: string
            enum: [WEB, IOS, ANDROID, ALL]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreFeedResponse'

  /api/v1/search/products:
    get:
      tags:
        - Search
      summary: Product Search
      description: Search products using text queries, locations, and filters.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: latitude
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: longitude
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
        - name: categorySlug
          in: query
          required: false
          schema:
            type: string
        - name: brandId
          in: query
          required: false
          schema:
            type: string
        - name: brandSlug
          in: query
          required: false
          schema:
            type: string
        - name: stockStatus
          in: query
          required: false
          schema:
            type: string
            enum: [IN_STOCK, LOW_STOCK, OUT_OF_STOCK]
        - name: inStock
          in: query
          required: false
          schema:
            type: boolean
        - name: minPricePaise
          in: query
          required: false
          schema:
            type: integer
        - name: maxPricePaise
          in: query
          required: false
          schema:
            type: integer
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [relevance, distance, rating, price_asc, price_desc, newest, popular]
            default: relevance
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchProductsResponse'

  /api/v1/search/suggestions:
    get:
      tags:
        - Search
      summary: Search Suggestions
      description: Get autocomplete query suggestions.
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Suggestions payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSuggestionsResponse'

  /api/v1/search/events:
    post:
      tags:
        - Search
      summary: Track Search Event
      description: Log analytics tracking for search executions.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
                - resultCount
              properties:
                query:
                  type: string
                  example: butter
                city:
                  type: string
                  example: Navsari
                latitude:
                  type: number
                  format: float
                longitude:
                  type: number
                  format: float
                radiusKm:
                  type: number
                  format: float
                filters:
                  type: object
                resultCount:
                  type: integer
                  example: 3
      responses:
        '200':
          description: Logged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "search-event-id-123"

  /api/v1/product-requests:
    post:
      tags:
        - Search
      summary: Request Missing Product
      description: Create a request for items that are missing or out of stock.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  example: "iPhone 16 charger"
                categoryId:
                  type: string
                productId:
                  type: string
                city:
                  type: string
                  example: Navsari
                latitude:
                  type: number
                  format: float
                longitude:
                  type: number
                  format: float
                radiusKm:
                  type: number
                  format: float
      responses:
        '200':
          description: Request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      query:
                        type: string
                      status:
                        type: string
                      city:
                        type: string
                      createdAt:
                        type: string

  /api/v1/products/{productId}:
    get:
      tags:
        - Products
      summary: Get Product Details
      description: Returns full product attributes, shop information, reviews rating summaries.
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'

  /api/v1/products/{productId}/stores:
    get:
      tags:
        - Products
      summary: Find Other Stores
      description: Returns other local stores selling the same product.
      security: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: latitude
          in: query
          required: false
          schema:
            type: number
        - name: longitude
          in: query
          required: false
          schema:
            type: number
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
            default: 10
      responses:
        '200':
          description: Stores list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductStoreLink'

  /api/v1/products/{productId}/similar:
    get:
      tags:
        - Products
      summary: Get Similar Products
      description: Returns active products in the same category or brand.
      security: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Similar products list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductCard'

  /api/v1/products/{productId}/reviews:
    get:
      tags:
        - Products
      summary: List Reviews
      description: Paginated reviews for a product.
      security: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: rating
          in: query
          required: false
          schema:
            type: integer
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, rating_high, rating_low]
      responses:
        '200':
          description: Reviews array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewsListResponse'
    post:
      tags:
        - Products
      summary: Add Review
      description: Create a product review.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
                - comment
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                comment:
                  type: string
                  example: "Highly recommended, fresh!"
                reservationId:
